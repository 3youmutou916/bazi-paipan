<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#1c1610"/>
      <stop offset="100%" stop-color="#0f0c09"/>
    </radialGradient>
    <radialGradient id="gold" cx="50%" cy="40%">
      <stop offset="0%" stop-color="#e0c870"/>
      <stop offset="60%" stop-color="#c9a050"/>
      <stop offset="100%" stop-color="#8a6820"/>
    </radialGradient>
  </defs>
  <!-- background -->
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>
  <rect x="8" y="8" width="496" height="496" rx="56" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.4"/>
  <!-- inner border -->
  <rect x="24" y="24" width="464" height="464" rx="44" fill="none" stroke="#3a2e1e" stroke-width="1"/>
  <!-- 卦 character in calligraphic style -->
  <text x="256" y="310" text-anchor="middle" font-family="KaiTi, STKaiti, serif" font-size="240" fill="url(#gold)" opacity="0.9">命</text>
  <!-- bottom line / seal -->
  <line x1="156" y1="370" x2="356" y2="370" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
  <text x="256" y="410" text-anchor="middle" font-family="KaiTi, STKaiti, serif" font-size="32" fill="#c9a050" opacity="0.5" letter-spacing="12">八 字 排 盘</text>
</svg>
