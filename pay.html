<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>支付 ¥0.99 · 八字命理解读</title>
<style>
  :root {
    --bg: #0f0c09; --card: #1c1610; --border: #3a2e1e;
    --gold: #c9a050; --gold-bright: #e0c870; --text: #c8b898; --text-dim: #8a7a64;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: "PingFang SC", "Noto Serif SC", serif;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; padding: 20px;
  }
  .card {
    background: var(--card); border: 1px solid var(--border);
    padding: 32px 24px; max-width: 420px; width: 100%; text-align: center;
  }
  h2 { color: var(--gold-bright); letter-spacing: 6px; font-size: 1.4em; margin-bottom: 8px; }
  .price { font-size: 2.2em; color: var(--gold); font-weight: bold; margin-bottom: 4px; }
  .desc { font-size: 0.8em; color: var(--text-dim); margin-bottom: 20px; line-height: 1.8; }

  .tabs { display: flex; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
  .tab { flex: 1; padding: 10px 0; font-size: 0.9em; color: var(--text-dim);
    cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .tab.wx.active { color: #09bb07; border-bottom-color: #09bb07; }
  .tab.zfb.active { color: #1677ff; border-bottom-color: #1677ff; }

  .qr-box { display: inline-block; padding: 16px; background: #fff; margin-bottom: 16px; }
  .qr-box img { display: block; width: 260px; height: 260px; }

  .info { font-size: 0.75em; color: var(--text-dim); margin-bottom: 18px; line-height: 1.8; }

  .txn-input {
    width: 100%; padding: 12px 16px; background: #14100b; border: 1px solid var(--border);
    color: #e8d8c0; font-size: 0.9em; text-align: center; letter-spacing: 1px; margin-bottom: 14px;
  }
  .txn-input::placeholder { color: #5a4a30; }

  .btn {
    width: 100%; padding: 14px; background: var(--gold); color: var(--bg);
    font-size: 1em; letter-spacing: 6px; font-weight: bold; border: none; cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn:active:not(:disabled) { opacity: 0.8; }
  .back { margin-top: 16px; font-size: 0.75em; color: var(--text-dim); }
  .back a { color: var(--gold); text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <h2>八字命理解读</h2>
  <div class="price">¥ 0.99</div>
  <div class="desc" id="infoText">
    微信 / 支付宝扫码支付<br>支付完成后粘贴交易单号解锁
  </div>

  <div class="tabs">
    <div class="tab wx active" id="tabWx" onclick="switchTab('wx')">微信支付</div>
    <div class="tab zfb" id="tabZfb" onclick="switchTab('zfb')">支付宝</div>
  </div>

  <div class="qr-box">
    <img id="qrImg" src="" alt="收款码">
  </div>

  <div class="info">
    1. 打开微信/支付宝扫一扫<br>
    2. 支付 <b style="color:#e0c870">¥0.99</b><br>
    3. 复制账单中的<b style="color:#d4a870">交易单号</b>
  </div>

  <input type="text" class="txn-input" id="txnInput"
    placeholder="粘贴交易单号（至少8位）" maxlength="30"
    oninput="document.getElementById('btnPay').disabled = this.value.trim().length < 8">

  <button class="btn" id="btnPay" disabled onclick="doConfirm()">
    确 认 支 付 · 返 回 解 读
  </button>

  <div class="back">
    <a href="./demo.html">← 返回排盘</a>
  </div>
</div>

<script>
var WX_QR = '';
var ZFB_QR = '';
var currentTab = 'wx';
var personData = null;

// Read QR images from parent page config (passed via URL hash or localStorage)
(function init() {
  // Try to get person data from URL
  var hash = window.location.hash;
  if (hash) {
    try { personData = JSON.parse(decodeURIComponent(hash.substring(1))); } catch(e) {}
  }
  if (!personData) {
    try { personData = JSON.parse(localStorage.getItem('mbd_pay_data') || '{}'); } catch(e) {}
  }
  // Get QR data from localStorage (set by main page)
  try { WX_QR = localStorage.getItem('pay_qr_wx') || ''; } catch(e) {}
  try { ZFB_QR = localStorage.getItem('pay_qr_zfb') || ''; } catch(e) {}
  switchTab('wx');
})();

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabWx').className = 'tab wx' + (tab === 'wx' ? ' active' : '');
  document.getElementById('tabZfb').className = 'tab zfb' + (tab === 'zfb' ? ' active' : '');
  var img = document.getElementById('qrImg');
  img.src = tab === 'wx' ? WX_QR : ZFB_QR;
}

function doConfirm() {
  var txn = document.getElementById('txnInput').value.trim();
  if (txn.length < 8 || !personData) return;

  // Store payment info
  var key = 'bazi_paid_' + personData.hash;
  try {
    localStorage.setItem(key, '1');
    localStorage.setItem(key + '_txn', txn);
    localStorage.removeItem('mbd_pay_data');
  } catch(e) {}

  // Redirect back to main page
  window.location.href = './demo.html?mpaid=1';
}
</script>
</body>
</html>
