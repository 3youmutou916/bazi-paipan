<script>
// ===== 八字排盘计算器 (inlined) =====
const TIAN_GAN = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
const DI_ZHI  = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
const GAN_ZHI_60 = [];
for (let i = 0; i < 60; i++) { GAN_ZHI_60.push(TIAN_GAN[i % 10] + DI_ZHI[i % 12]); }

const GAN_WUXING = {
  '甲':'木','乙':'木','丙':'火','丁':'火','戊':'土','己':'土',
  '庚':'金','辛':'金','壬':'水','癸':'水'
};
const ZHI_WUXING = {
  '子':'水','丑':'土','寅':'木','卯':'木','辰':'土','巳':'火',
  '午':'火','未':'土','申':'金','酉':'金','戌':'土','亥':'水'
};
const GAN_YINYANG = {
  '甲':true, '乙':false, '丙':true, '丁':false, '戊':true,
  '己':false, '庚':true, '辛':false, '壬':true, '癸':false
};
const CANG_GAN = {
  '子': ['癸'], '丑': ['己', '癸', '辛'], '寅': ['甲', '丙', '戊'],
  '卯': ['乙'], '辰': ['戊', '乙', '癸'], '巳': ['丙', '庚', '戊'],
  '午': ['丁', '己'], '未': ['己', '丁', '乙'], '申': ['庚', '壬', '戊'],
  '酉': ['辛'], '戌': ['戊', '辛', '丁'], '亥': ['壬', '甲'],
};

const JIEQI_BASE_2000 = {
  '立春':{m:2,d:4.29}, '惊蛰':{m:3,d:5.72}, '清明':{m:4,d:4.87},
  '立夏':{m:5,d:5.52}, '芒种':{m:6,d:5.55}, '小暑':{m:7,d:7.20},
  '立秋':{m:8,d:7.58}, '白露':{m:9,d:7.74}, '寒露':{m:10,d:8.22},
  '立冬':{m:11,d:7.58}, '大雪':{m:12,d:7.19}, '小寒':{m:1,d:5.68},
};
const JIE_ORDER = ['立春','惊蛰','清明','立夏','芒种','小暑','立秋','白露','寒露','立冬','大雪','小寒'];
const JIE_TO_YUEZHI = {
  '立春':'寅','惊蛰':'卯','清明':'辰','立夏':'巳','芒种':'午',
  '小暑':'未','立秋':'申','白露':'酉','寒露':'戌','立冬':'亥','大雪':'子','小寒':'丑'
};

function getJieQiDate(year, jieName) {
  const base = JIEQI_BASE_2000[jieName];
  if (!base) throw new Error('未知节气: ' + jieName);
  const adjYear = base.m === 1 ? year + 1 : year;
  const centuryCorr = (year - 2000) * 0.2422 - Math.floor((year - 2000) / 4);
  const fullDay = base.d + centuryCorr;
  const day = Math.floor(fullDay);
  const fraction = fullDay - day;
  return { year: adjYear, month: base.m, day: day, hour: Math.round(fraction * 24) };
}

function gregorianToJDN(year, month, day) {
  const a = Math.floor((14 - month) / 12);
  const y = year + 4800 - a;
  const m = month + 12 * a - 3;
  return day + Math.floor((153 * m + 2) / 5) + 365 * y
       + Math.floor(y / 4) - Math.floor(y / 100) + Math.floor(y / 400) - 32045;
}

function calcYearPillar(year, month, day, hour) {
  const lichun = getJieQiDate(year, '立春');
  const lichunDate = new Date(lichun.year, lichun.month - 1, lichun.day, lichun.hour || 0);
  const birthDate = new Date(year, month - 1, day, hour || 0);
  const effectiveYear = birthDate < lichunDate ? year - 1 : year;
  const index = ((effectiveYear - 4) % 60 + 60) % 60;
  return { ganZhi: GAN_ZHI_60[index], gan: TIAN_GAN[index % 10], zhi: DI_ZHI[index % 12], index };
}

const YUE_GAN_MAP = {
  '甲':'丙','己':'丙','乙':'戊','庚':'戊','丙':'庚','辛':'庚',
  '丁':'壬','壬':'壬','戊':'甲','癸':'甲',
};
const YUE_ZHI_ORDER = ['寅','卯','辰','巳','午','未','申','酉','戌','亥','子','丑'];

function calcMonthPillar(year, month, day, hour, yearGan) {
  const birthD = new Date(year, month - 1, day, hour || 0);
  const allJie = [];
  for (let y = year - 1; y <= year; y++) {
    for (const jieName of JIE_ORDER) {
      const jd = getJieQiDate(y, jieName);
      allJie.push({ name: jieName, date: new Date(jd.year, jd.month - 1, jd.day, jd.hour || 0) });
    }
  }
  allJie.sort((a, b) => a.date - b.date);
  let yueZhi = null;
  for (let i = 0; i < allJie.length - 1; i++) {
    if (allJie[i].date <= birthD && birthD < allJie[i + 1].date) {
      yueZhi = JIE_TO_YUEZHI[allJie[i].name]; break;
    }
  }
  if (!yueZhi) { const zbm = ['丑','寅','卯','辰','巳','午','未','申','酉','戌','亥','子']; yueZhi = zbm[(month - 1) % 12]; }
  const zhiOrderIndex = YUE_ZHI_ORDER.indexOf(yueZhi);
  const yinYueGanIdx = TIAN_GAN.indexOf(YUE_GAN_MAP[yearGan]);
  const yueGanIdx = (yinYueGanIdx + zhiOrderIndex) % 10;
  const gan = TIAN_GAN[yueGanIdx], zhi = yueZhi;
  let gzIndex = 0;
  for (let i = 0; i < 60; i++) { if (i % 10 === yueGanIdx && i % 12 === DI_ZHI.indexOf(zhi)) { gzIndex = i; break; } }
  return { ganZhi: gan + zhi, gan, zhi, index: gzIndex };
}

function calcDayPillar(year, month, day, hour, isNightZiShi) {
  let jdYear = year, jdMonth = month, jdDay = day;
  if (isNightZiShi) {
    const d = new Date(year, month - 1, day + 1);
    jdYear = d.getFullYear(); jdMonth = d.getMonth() + 1; jdDay = d.getDate();
  }
  const jdn = gregorianToJDN(jdYear, jdMonth, jdDay);
  const gzIndex = ((jdn % 60) + 49) % 60;
  return { ganZhi: GAN_ZHI_60[gzIndex], gan: TIAN_GAN[gzIndex % 10], zhi: DI_ZHI[gzIndex % 12], index: gzIndex };
}

function getShiChenZhi(hour) {
  if (hour >= 23 || hour < 1) return '子'; if (hour >= 1 && hour < 3) return '丑';
  if (hour >= 3 && hour < 5) return '寅'; if (hour >= 5 && hour < 7) return '卯';
  if (hour >= 7 && hour < 9) return '辰'; if (hour >= 9 && hour < 11) return '巳';
  if (hour >= 11 && hour < 13) return '午'; if (hour >= 13 && hour < 15) return '未';
  if (hour >= 15 && hour < 17) return '申'; if (hour >= 17 && hour < 19) return '酉';
  if (hour >= 19 && hour < 21) return '戌'; return '亥';
}
const SHI_GAN_MAP = { '甲':'甲','己':'甲','乙':'丙','庚':'丙','丙':'戊','辛':'戊','丁':'庚','壬':'庚','戊':'壬','癸':'壬' };

function calcHourPillar(dayGan, hour) {
  const shiZhi = getShiChenZhi(hour);
  const shiGanIdx = (TIAN_GAN.indexOf(SHI_GAN_MAP[dayGan]) + DI_ZHI.indexOf(shiZhi)) % 10;
  const gan = TIAN_GAN[shiGanIdx];
  let gzIndex = 0;
  for (let i = 0; i < 60; i++) { if (TIAN_GAN[i % 10] === gan && DI_ZHI[i % 12] === shiZhi) { gzIndex = i; break; } }
  return { ganZhi: gan + shiZhi, gan, zhi: shiZhi, index: gzIndex, shiChen: shiZhi + '时' };
}

function wuxingRelation(riWx, otWx) {
  if (riWx === otWx) return 'same';
  const sheng = { '木':'火','火':'土','土':'金','金':'水','水':'木' };
  const ke = { '木':'土','土':'水','水':'火','火':'金','金':'木' };
  if (sheng[riWx] === otWx) return 'woSheng';
  if (sheng[otWx] === riWx) return 'shengWo';
  if (ke[riWx] === otWx) return 'woKe';
  if (ke[otWx] === riWx) return 'keWo';
  return 'unknown';
}
function calcShiShen(riGan, otherGan) {
  if (!riGan || !otherGan) return '—';
  const riWx = GAN_WUXING[riGan], otWx = GAN_WUXING[otherGan];
  const sameYinYang = GAN_YINYANG[riGan] === GAN_YINYANG[otherGan];
  switch (wuxingRelation(riWx, otWx)) {
    case 'same': return sameYinYang ? '比肩' : '劫财';
    case 'shengWo': return sameYinYang ? '偏印' : '正印';
    case 'woSheng': return sameYinYang ? '食神' : '伤官';
    case 'keWo': return sameYinYang ? '七杀' : '正官';
    case 'woKe': return sameYinYang ? '偏财' : '正财';
    default: return '—';
  }
}
function calcAllShiShen(riGan, pillars) {
  return {
    year: calcShiShen(riGan, pillars.year.gan),
    month: calcShiShen(riGan, pillars.month.gan),
    day: '日主',
    hour: calcShiShen(riGan, pillars.hour.gan)
  };
}

function calcDaYun(year, month, day, hour, yearGan, monthGan, monthZhi, sex) {
  const isYangNian = GAN_YINYANG[yearGan];
  let shunPai;
  if (isYangNian && sex === '男') shunPai = true;
  else if (isYangNian && sex === '女') shunPai = false;
  else if (!isYangNian && sex === '男') shunPai = false;
  else shunPai = true;
  const direction = shunPai ? '顺排' : '逆排';
  const directionLabel = shunPai ? '顺' : '逆';
  const birthD = new Date(year, month - 1, day, hour || 0);
  const allJieDates = [];
  for (let y = year - 1; y <= year + 1; y++) {
    for (const jieName of JIE_ORDER) {
      const jd = getJieQiDate(y, jieName);
      allJieDates.push({ name: jieName, date: new Date(jd.year, jd.month - 1, jd.day, jd.hour || 0) });
    }
  }
  allJieDates.sort((a, b) => a.date - b.date);
  let daysToJie = 0, targetJieName = '';
  if (shunPai) {
    for (const jie of allJieDates) { if (jie.date > birthD) { targetJieName = jie.name; daysToJie = Math.ceil((jie.date - birthD) / 86400000); break; } }
  } else {
    for (let i = allJieDates.length - 1; i >= 0; i--) { if (allJieDates[i].date < birthD) { targetJieName = allJieDates[i].name; daysToJie = Math.ceil((birthD - allJieDates[i].date) / 86400000); break; } }
  }
  if (daysToJie <= 0) { daysToJie = 1; targetJieName = targetJieName || '未知'; }
  const startAgeRaw = daysToJie / 3;
  const startAge = Math.max(0, Math.round(startAgeRaw));
  const remainder = daysToJie % 3;
  let startAgeDetail = '';
  if (startAgeRaw < 1) { startAgeDetail = startAge + '岁起运（约' + daysToJie + '天，即出生即交运）'; }
  else if (remainder === 0) { startAgeDetail = startAge + '岁起运'; }
  else { startAgeDetail = startAge + '岁起运（约' + Math.floor(startAgeRaw) + '岁' + Math.round(remainder * 4) + '个月）'; }
  const monthGanIdx = TIAN_GAN.indexOf(monthGan), monthZhiIdx = DI_ZHI.indexOf(monthZhi);
  const daYunPillars = [];
  for (let i = 0; i < 8; i++) {
    let gIdx = shunPai ? (monthGanIdx + 1 + i) % 10 : (monthGanIdx - 1 - i + 10) % 10;
    let zIdx = shunPai ? (monthZhiIdx + 1 + i) % 12 : (monthZhiIdx - 1 - i + 12) % 12;
    const ageStart = startAge + i * 10, ageEnd = startAge + i * 10 + 9;
    daYunPillars.push({ step: i + 1, ganZhi: TIAN_GAN[gIdx] + DI_ZHI[zIdx], gan: TIAN_GAN[gIdx], zhi: DI_ZHI[zIdx], ageRange: ageStart + '-' + ageEnd + '岁', ageStart, ageEnd });
  }
  return { direction, directionLabel, targetJie: targetJieName, daysToJie, startAge, startAgeDetail, pillars: daYunPillars };
}

function getTianYiGuiRen(gan) {
  const map = { '甲':['丑','未'],'戊':['丑','未'],'庚':['丑','未'],'乙':['子','申'],'己':['子','申'],'丙':['亥','酉'],'丁':['亥','酉'],'壬':['卯','巳'],'癸':['卯','巳'],'辛':['寅','午'] };
  return map[gan] || [];
}
function getWenChang(gan) {
  const map = { '甲':'巳','乙':'午','丙':'申','丁':'酉','戊':'申','己':'酉','庚':'亥','辛':'子','壬':'寅','癸':'卯' };
  return map[gan] || null;
}
function getYiMa(zhi) {
  const map = { '申':'寅','子':'寅','辰':'寅','寅':'申','午':'申','戌':'申','巳':'亥','酉':'亥','丑':'亥','亥':'巳','卯':'巳','未':'巳' };
  return map[zhi] || null;
}
function getTaoHua(zhi) {
  const map = { '申':'酉','子':'酉','辰':'酉','寅':'卯','午':'卯','戌':'卯','巳':'午','酉':'午','丑':'午','亥':'子','卯':'子','未':'子' };
  return map[zhi] || null;
}
function getHuaGai(zhi) {
  const map = { '申':'辰','子':'辰','辰':'辰','寅':'戌','午':'戌','戌':'戌','巳':'丑','酉':'丑','丑':'丑','亥':'未','卯':'未','未':'未' };
  return map[zhi] || null;
}
function calcShenSha(pillars, dayGan, dayZhi, yearZhi) {
  const result = { year: [], month: [], day: [], hour: [] };
  const keys = ['year','month','day','hour'];
  const data = [pillars.year, pillars.month, pillars.day, pillars.hour];
  for (let i = 0; i < 4; i++) {
    const p = data[i], shenSha = result[keys[i]];
    if (getTianYiGuiRen(dayGan).includes(p.zhi)) shenSha.push('天乙贵人');
    if (getWenChang(dayGan) === p.zhi) shenSha.push('文昌贵人');
    if (getYiMa(yearZhi) === p.zhi) shenSha.push('驿马');
    if (getTaoHua(yearZhi) === p.zhi) shenSha.push('桃花');
    if (getHuaGai(dayZhi) === p.zhi) shenSha.push('华盖');
    const yangRenMap = { '甲':'卯','丙':'午','戊':'午','庚':'酉','壬':'子' };
    if (yangRenMap[dayGan] === p.zhi) shenSha.push('羊刃');
  }
  return result;
}

function calcKongWang(dayGzIndex) {
  const kongWangTable = [ ['戌','亥'],['申','酉'],['午','未'],['辰','巳'],['寅','卯'],['子','丑'] ];
  return kongWangTable[Math.floor(dayGzIndex / 10)] || ['?','?'];
}

function baziPaiPan({ year, month, day, hour, sex, name }) {
  const isNightZiShi = (hour >= 23 && hour < 24);
  const yearPillar = calcYearPillar(year, month, day, hour);
  const dayPillar = calcDayPillar(year, month, day, hour, isNightZiShi);
  const monthPillar = calcMonthPillar(year, month, day, hour, yearPillar.gan);
  let hourPillar;
  if (hour === undefined || hour === null) {
    hourPillar = { ganZhi: '未知', gan: null, zhi: null, index: -1, shiChen: '未知' };
  } else {
    hourPillar = calcHourPillar(dayPillar.gan, hour);
  }
  const pillars = { year: yearPillar, month: monthPillar, day: dayPillar, hour: hourPillar };
  const shiShen = calcAllShiShen(dayPillar.gan, pillars);
  const changSheng = {
    year: getChangShengName(dayPillar.gan, yearPillar.zhi),
    month: getChangShengName(dayPillar.gan, monthPillar.zhi),
    day: getChangShengName(dayPillar.gan, dayPillar.zhi),
    hour: hourPillar.zhi ? getChangShengName(dayPillar.gan, hourPillar.zhi) : '—'
  };
  const naYin = {
    year: getNaYin(yearPillar.index), month: getNaYin(monthPillar.index),
    day: getNaYin(dayPillar.index), hour: hourPillar.index >= 0 ? getNaYin(hourPillar.index) : '—'
  };
  const daYun = calcDaYun(year, month, day, hour, yearPillar.gan, monthPillar.gan, monthPillar.zhi, sex);
  const shenSha = calcShenSha(pillars, dayPillar.gan, dayPillar.zhi, yearPillar.zhi);
  const wuxingCount = { '木':0,'火':0,'土':0,'金':0,'水':0 };
  for (const key of ['year','month','day','hour']) {
    const p = pillars[key];
    if (p.gan) wuxingCount[GAN_WUXING[p.gan]]++;
    if (p.zhi) wuxingCount[ZHI_WUXING[p.zhi]]++;
  }
  const kongWang = calcKongWang(dayPillar.index);
  return {
    input: { year, month, day, hour, sex, name },
    pillars, shiShen, changSheng, naYin,
    cangGan: {
      year: CANG_GAN[yearPillar.zhi] || [], month: CANG_GAN[monthPillar.zhi] || [],
      day: CANG_GAN[dayPillar.zhi] || [], hour: hourPillar.zhi ? CANG_GAN[hourPillar.zhi] || [] : []
    },
    daYun, shenSha, wuxingCount, kongWang,
    dayMaster: { gan: dayPillar.gan, wuxing: GAN_WUXING[dayPillar.gan], yinYang: GAN_YINYANG[dayPillar.gan] ? '阳' : '阴' }
  };
}

// ===== 格式化输出（控制台用）=====
function formatBaziResult(result) {
  const p = result.pillars, ss = result.shiShen, cs = result.changSheng;
  const ny = result.naYin, cg = result.cangGan, dy = result.daYun;
  const sha = result.shenSha, wc = result.wuxingCount, dm = result.dayMaster;
  function pad(str, len) { let w = 0; for (const ch of String(str)) { w += /[一-鿿]/.test(ch) ? 2 : 1; } return String(str) + ' '.repeat(Math.max(0, len - w)); }
  function bar(n) { return '█'.repeat(Math.max(0, n)); }
  const lines = [];
  lines.push('', '═══════════════════════════════════════', '           🏮 四 柱 八 字 排 盘', '═══════════════════════════════════════');
  if (result.input.name) lines.push('  姓名：' + result.input.name);
  lines.push('  出生：' + result.input.year + '年' + result.input.month + '月' + result.input.day + '日 ' + result.input.hour + '时');
  lines.push('  性别：' + result.input.sex + '    日主：' + dm.gan + '(' + dm.wuxing + '·' + dm.yinYang + ')');
  lines.push('', '  ┌────────┬────────┬────────┬────────┐', '  │  年柱  │  月柱  │  日柱  │  时柱  │', '  ├────────┼────────┼────────┼────────┤');
  lines.push('  │ ' + pad(p.year.ganZhi, 6) + ' │ ' + pad(p.month.ganZhi, 6) + ' │ ' + pad(p.day.ganZhi, 6) + ' │ ' + pad(p.hour.ganZhi || '—', 6) + ' │');
  lines.push('  │ 十神' + pad(ss.year, 4) + ' │ 十神' + pad(ss.month, 4) + ' │  日主  │ 十神' + pad(ss.hour || '—', 4) + ' │');
  lines.push('  │ 纳音' + pad(ny.year, 4) + ' │ 纳音' + pad(ny.month, 4) + ' │ 纳音' + pad(ny.day, 4) + ' │ 纳音' + pad(ny.hour || '—', 4) + ' │');
  lines.push('  │ 长生' + pad(cs.year, 4) + ' │ 长生' + pad(cs.month, 4) + ' │ 长生' + pad(cs.day, 4) + ' │ 长生' + pad(cs.hour || '—', 4) + ' │');
  lines.push('  ├────────┼────────┼────────┼────────┤');
  lines.push('  │藏' + pad(cg.year.join(''), 6) + ' │藏' + pad(cg.month.join(''), 6) + ' │藏' + pad(cg.day.join(''), 6) + ' │藏' + pad(cg.hour.join(''), 6) + ' │');
  lines.push('  │神' + pad(sha.year.join(',') || '—', 6) + ' │神' + pad(sha.month.join(',') || '—', 6) + ' │神' + pad(sha.day.join(',') || '—', 6) + ' │神' + pad(sha.hour.join(',') || '—', 6) + ' │');
  lines.push('  └────────┴────────┴────────┴────────┘', '');
  lines.push('  📊 五行分布：');
  lines.push('     木:' + bar(wc['木']) + ' ' + wc['木'] + '  火:' + bar(wc['火']) + ' ' + wc['火'] + '  土:' + bar(wc['土']) + ' ' + wc['土'] + '  金:' + bar(wc['金']) + ' ' + wc['金'] + '  水:' + bar(wc['水']) + ' ' + wc['水']);
  lines.push('  空亡：' + result.kongWang[0] + '、' + result.kongWang[1], '');
  lines.push('  📅 大运（' + dy.direction + '）：', '  起运：' + dy.startAgeDetail);
  lines.push('  ┌────────┬────────────┬────────┐', '  │  步数  │  年龄范围  │  干支  │', '  ├────────┼────────────┼────────┤');
  if (dy.startAge > 0) { lines.push('  │ 起运前 │ 0-' + (dy.startAge - 1) + '岁     │ ' + p.month.ganZhi + ' │'); }
  else { lines.push('  │ 起运前 │ 出生即交运 │ ' + p.month.ganZhi + ' │'); }
  for (const dyp of dy.pillars) { lines.push('  │ 第' + dyp.step + '步  │ ' + pad(String(dyp.ageRange), 10) + ' │ ' + dyp.ganZhi + '   │'); }
  lines.push('  └────────┴────────────┴────────┘', '', '═══════════════════════════════════════');
  return lines.join('\n');
}

function calcLiuNian(year) {
  const index = ((year - 4) % 60 + 60) % 60;
  return { ganZhi: GAN_ZHI_60[index], gan: TIAN_GAN[index % 10], zhi: DI_ZHI[index % 12], index };
}

// 地支关系
const ZHI_LIU_HE = { '子':'丑','丑':'子','寅':'亥','亥':'寅','卯':'戌','戌':'卯','辰':'酉','酉':'辰','巳':'申','申':'巳','午':'未','未':'午' };
const ZHI_LIU_CHONG = { '子':'午','午':'子','丑':'未','未':'丑','寅':'申','申':'寅','卯':'酉','酉':'卯','辰':'戌','戌':'辰','巳':'亥','亥':'巳' };
const ZHI_LIU_HAI = { '子':'未','未':'子','丑':'午','午':'丑','寅':'巳','巳':'寅','卯':'辰','辰':'卯','申':'亥','亥':'申','酉':'戌','戌':'酉' };

function getFullZhiRelations(liuNianZhi, pillars) {
  const rels = [];
  for (const [col, zhi] of [['年', pillars.year.zhi], ['月', pillars.month.zhi], ['日', pillars.day.zhi], ['时', pillars.hour.zhi]]) {
    if (!zhi) continue;
    if (ZHI_LIU_HE[liuNianZhi] === zhi) rels.push(`合${col}支`);
    if (ZHI_LIU_CHONG[liuNianZhi] === zhi) rels.push(`冲${col}支`);
    if (ZHI_LIU_HAI[liuNianZhi] === zhi) rels.push(`害${col}支`);
  }
  return rels;
}

function getZhiRelationDesc(liuNianZhi, yearZhi, dayZhi) {
  const tags = [];
  if (ZHI_LIU_HE[liuNianZhi] === yearZhi) tags.push('合年支');
  if (ZHI_LIU_HE[liuNianZhi] === dayZhi) tags.push('合日支');
  if (ZHI_LIU_CHONG[liuNianZhi] === yearZhi) tags.push('冲年支');
  if (ZHI_LIU_CHONG[liuNianZhi] === dayZhi) tags.push('冲日支');
  if (ZHI_LIU_HAI[liuNianZhi] === yearZhi) tags.push('害年支');
  if (ZHI_LIU_HAI[liuNianZhi] === dayZhi) tags.push('害日支');
  return tags.length > 0 ? tags.join('·') : '—';
}

function getLiunianFortuneTag(liuNianGan, riGan) {
  const shiShen = calcShiShen(riGan, liuNianGan);
  const good = ['正印','偏印','正财','正官','食神'];
  const bad = ['七杀','偏财','伤官','劫财'];
  if (good.includes(shiShen)) return { tag: '吉', cls: 'good' };
  if (bad.includes(shiShen)) return { tag: '平', cls: 'neutral' };
  return { tag: '平', cls: 'neutral' };
}

function getLiunianDetail(ln, r) {
  const p = r.pillars;
  const dm = r.dayMaster;
  const shiShen = calcShiShen(dm.gan, ln.gan);
  const naYinVal = getNaYin(ln.index);
  const changShengName = getChangShengName(dm.gan, ln.zhi);
  const cangGanArr = CANG_GAN[ln.zhi] || [];
  const cangGanSS = cangGanArr.map(g => calcShiShen(dm.gan, g)).join('、');
  const fullRels = getFullZhiRelations(ln.zhi, p);
  const fortune = getLiunianFortuneTag(ln.gan, dm.gan);

  // 生成该流年的重点关注
  const focusAreas = [];
  const hasChongRi = fullRels.some(r => r.includes('冲日'));
  const hasHeRi = fullRels.some(r => r.includes('合日'));
  const hasChongNian = fullRels.some(r => r.includes('冲年'));
  const hasHeNian = fullRels.some(r => r.includes('合年'));
  const hasHai = fullRels.some(r => r.includes('害'));
  if (hasChongRi) { focusAreas.push('感情婚姻波动较大，注意夫妻关系'); }
  if (hasHeRi) { focusAreas.push('人际关系顺畅，感情有新进展'); }
  if (hasChongNian) { focusAreas.push('工作环境/住所易有变动'); }
  if (hasHeNian) { focusAreas.push('家庭和睦，长辈助力'); }
  if (hasHai) { focusAreas.push('防小人口舌，注意健康隐疾'); }
  if (shiShen === '正官' || shiShen === '七杀') { focusAreas.push('事业压力增大，宜稳扎稳打'); }
  if (shiShen === '正财' || shiShen === '偏财') { focusAreas.push('财运变化明显，注意理财'); }
  if (shiShen === '正印' || shiShen === '偏印') { focusAreas.push('学习运旺，宜进修或考证'); }
  if (shiShen === '食神' || shiShen === '伤官') { focusAreas.push('创意活跃，宜拓展副业'); }
  if (shiShen === '比肩' || shiShen === '劫财') { focusAreas.push('人际应酬增多，注意合伙合作'); }
  if (focusAreas.length === 0) { focusAreas.push('平稳过渡，蓄力之年'); }

  // 长生十二宫解读
  const csWarn = ['死','病','墓','绝'];
  const csGood = ['长生','冠带','临官','帝旺'];
  let csNote = '';
  if (csGood.includes(changShengName)) csNote = `${changShengName}之位，气运上升`;
  else if (csWarn.includes(changShengName)) csNote = `${changShengName}之地，宜守不宜攻`;
  else if (changShengName === '沐浴') csNote = '沐浴桃花，感情丰富敏感';
  else if (changShengName === '衰') csNote = '衰地需养精蓄锐';

  return { shiShen, naYinVal, changShengName, cangGanArr, cangGanSS, fullRels, fortune, focusAreas, csNote };
}

// ===== 佩戴建议计算 =====
function calcCharmsRecommendation(r) {
  const wc = r.wuxingCount;
  const dm = r.dayMaster;
  const sheng = { '木':'火','火':'土','土':'金','金':'水','水':'木' };
  const ke = { '木':'土','土':'水','水':'火','火':'金','金':'木' };
  const shengWo = {}; for (const [k, v] of Object.entries(sheng)) { if (!shengWo[v]) shengWo[v] = []; shengWo[v].push(k); }
  const keWo = {}; for (const [k, v] of Object.entries(ke)) { if (!keWo[v]) keWo[v] = []; keWo[v].push(k); }

  // 五行强弱分布
  const elements = ['木','火','土','金','水'];
  const counts = elements.map(e => wc[e] || 0);
  const maxCount = Math.max(...counts);
  const minCount = Math.min(...counts);
  const total = counts.reduce((a, b) => a + b, 0) || 8;
  const avg = total / 5;

  const weak = elements.filter(e => (wc[e] || 0) < 2);
  const strong = elements.filter(e => (wc[e] || 0) >= 3);

  const riWx = dm.wuxing;
  const riCount = wc[riWx] || 0;

  // 判断用神方向
  let yongShen = [];
  let yongReason = '';
  if (riCount >= 4) {
    // 身强 → 克泄耗
    yongShen = [ke[riWx], sheng[riWx], keWo[riWx] ? keWo[riWx][0] : null].filter(Boolean);
    yongReason = '日主身强，宜克泄耗';
  } else if (riCount <= 2) {
    // 身弱 → 生扶
    yongShen = [shengWo[riWx] ? shengWo[riWx][0] : null, riWx].filter(Boolean);
    yongReason = '日主偏弱，宜生扶';
  } else {
    yongShen = weak.length > 0 ? weak : [sheng[riWx]];
    yongReason = '日主中和，补缺为上';
  }

  const charmMap = {
    '木': { color: '绿色/青色', crystals: '翡翠、绿松石、孔雀石', items: '木质手串、葫芦挂件、绿植盆栽', direction: '东方', zodiac: '虎兔相关饰品', desc: '增强生机活力，助长运势' },
    '火': { color: '红色/紫色', crystals: '红玛瑙、石榴石、紫水晶', items: '红绳手链、灯笼摆件、电子灯光', direction: '南方', zodiac: '蛇马相关饰品', desc: '增强热情与人缘，提升光明能量' },
    '土': { color: '黄色/棕色', crystals: '黄水晶、蜜蜡、金发晶', items: '陶瓷摆件、泰山石敢当、五帝钱', direction: '中央', zodiac: '龙狗牛羊饰品', desc: '增强稳定与财运，厚重承载' },
    '金': { color: '白色/金色', crystals: '白水晶、月光石、银饰', items: '金属摆件、铜钱葫芦、金元宝', direction: '西方', zodiac: '猴鸡相关饰品', desc: '增强决断力与贵气，辟邪护身' },
    '水': { color: '黑色/蓝色', crystals: '黑曜石、海蓝宝、青金石', items: '水景摆件、鱼缸、黑曜石貔貅', direction: '北方', zodiac: '鼠猪相关饰品', desc: '增强智慧与财运，源远流长' }
  };

  const primaryEl = yongShen[0];
  const secondaryEl = yongShen[1] || yongShen[0];

  return {
    yongReason,
    yongShen: primaryEl,
    weakElements: weak,
    strongElements: strong,
    primary: charmMap[primaryEl],
    secondary: charmMap[secondaryEl],
    charmMap
  };
}

window.doPaiPan = async function() {
  const errorEl = document.getElementById('error');
  const resultEl = document.getElementById('result');
  errorEl.style.display = 'none';
  resultEl.style.display = 'none';

  try {
    const params = {
      year:  parseInt(document.getElementById('year').value),
      month: parseInt(document.getElementById('month').value),
      day:   parseInt(document.getElementById('day').value),
      hour:  parseInt(document.getElementById('hour').value),
      sex:   document.getElementById('sex').value,
      name:  document.getElementById('name').value || undefined
    };
    if (!params.year || !params.month || !params.day || isNaN(params.hour)) {
      throw new Error('请填写完整的出生日期和时辰');
    }
    if (params.year < 1900 || params.year > 2100) {
      throw new Error('年份暂支持 1900-2100');
    }

    const result = baziPaiPan(params);
    renderResult(result);
    resultEl.style.display = 'block';
    console.log(formatBaziResult(result));

    // 滚动到结果区
    resultEl.scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch (e) {
    errorEl.textContent = '⚠ ' + e.message;
    errorEl.style.display = 'block';
  }
};

window.doAIAnalysis = async function() {
  const DEFAULT_KEY = 'sk-da21654a111c42fdb7ffbd02eeccf548';
  const apiKey = document.getElementById('apiKey').value.trim() || DEFAULT_KEY;

  const r = window._baziResult;
  if (!r) return;

  const btnAI = document.getElementById('btnAI');
  const aiContent = document.getElementById('aiContent');
  btnAI.disabled = true;
  aiContent.innerHTML = `
    <div class="loading-spinner">
      <div class="spinner"></div>
      <span style="color:var(--text-dim);letter-spacing:3px">命盘推演中，请稍候...</span>
    </div>`;

  // 构建 prompt
  const prompt = buildAnalysisPrompt(r);

  try {
    const response = await fetch('https://api.deepseek.com/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + apiKey
      },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          { role: 'user', content: prompt }
        ],
        temperature: 0.7,
        max_tokens: 4096
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || 'HTTP ' + response.status + ' ' + response.statusText);
    }

    const data = await response.json();
    const analysis = data.choices[0].message.content;

    // 渲染 markdown 风格的 AI 输出
    aiContent.innerHTML = '<div class="ai-content">' + formatAIContent(analysis) + '</div>';
    btnAI.style.display = 'none';

  } catch (e) {
    aiContent.innerHTML = `
      <div class="error" style="margin:8px 0">
        ⚠ 命盘解读失败：${e.message}<br>
        <span style="font-size:0.8em">请稍后重试</span>
      </div>
      <div style="text-align:center;margin-top:12px">
        <button class="btn btn-ai" onclick="doAIAnalysis()" style="max-width:280px">重 新 解 读</button>
      </div>`;
  }
};

function formatAIContent(text) {
  let html = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  // Split into paragraphs
  const paragraphs = html.split(/\n\n+/);
  const result = [];

  for (const block of paragraphs) {
    const lines = block.split('\n');
    let inList = false;
    const parts = [];

    for (const line of lines) {
      // Headers
      if (/^### /.test(line)) {
        if (inList) { parts.push('</ul>'); inList = false; }
        parts.push('<h4>' + line.replace(/^### /, '') + '</h4>');
      } else if (/^## /.test(line)) {
        if (inList) { parts.push('</ul>'); inList = false; }
        parts.push('<h4>' + line.replace(/^## /, '') + '</h4>');
      } else if (/^- /.test(line)) {
        if (!inList) { parts.push('<ul>'); inList = true; }
        parts.push('<li>' + line.replace(/^- /, '') + '</li>');
      } else {
        if (inList) { parts.push('</ul>'); inList = false; }
        parts.push(line);
      }
    }
    if (inList) { parts.push('</ul>'); }

    let blockHtml = parts.join('\n');
    // Inline formatting
    blockHtml = blockHtml
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/\n/g, '<br>');

    result.push('<p>' + blockHtml + '</p>');
  }

  return result.join('');
}
